name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches:
      - dev
    tags:
      - "v*.*.*"

# Cancel in-progress runs for the same ref (saves minutes on rapid pushes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. org/my-service

jobs:
  # ──────────────────────────────────────────────
  # 1. TEST
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   # reads the version you declared in go.mod
          cache: true               # caches the module cache automatically

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  # ──────────────────────────────────────────────
  # 2. BUILD / PUSH DOCKER IMAGE
  # ──────────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: test   # only build if tests pass

    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Resolve image version & tags ──────────
      - name: Read VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Resolve Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # ── Tag push (release) ──────────────────────────────────────────
            # Full semver  →  v1.2.3
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            # Major.minor  →  v1.2
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            # floating latest
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

            # ── Push to dev branch ──────────────────────────────────────────
            # Short SHA + -dev suffix  →  abc1234-dev
            type=raw,value=${{ github.sha }}-dev,enable=${{ github.ref == 'refs/heads/dev' }}
            # Stable dev pointer       →  dev
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}

            # ── Pull request ────────────────────────────────────────────────
            # PR number   →  pr-42  (build only, never pushed)
            type=ref,event=pr

      # ── Auth (skip on PR – we won't push anyway) ──
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build cache ───────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build and Push ────────────────────────
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
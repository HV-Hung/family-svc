name: Version

# Triggers when a PR is merged into main
on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  tag:
    name: Tag Release
    # Only run if the PR was actually merged
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write   # push tag to main

    outputs:
      released_version: ${{ steps.version.outputs.val }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read current version
        id: version
        run: |
          V=$(cat VERSION)
          echo "val=$V" >> "$GITHUB_OUTPUT"

      - name: Create & push release tag
        run: |
          TAG="v${{ steps.version.outputs.val }}"
          git tag "$TAG" -m "Release $TAG"
          git push origin "$TAG"

  bump:
    name: Bump Dev Version
    needs: tag
    runs-on: ubuntu-latest

    permissions:
      contents: write   # commit bump to dev

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve bump type from PR labels
        id: bump_type
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          echo "PR labels: $LABELS"

          if echo "$LABELS" | grep -q '"major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"patch"'; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No version label (major/minor/patch) found on PR – defaulting to patch"
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump VERSION
        id: versions
        run: |
          # Use released_version from tag job as base
          OLD="${{ needs.tag.outputs.released_version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD"

          case "${{ steps.bump_type.outputs.type }}" in
            major)
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor)
              MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch)
              PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW" > VERSION

          echo "old=${OLD}" >> "$GITHUB_OUTPUT"
          echo "new=${NEW}" >> "$GITHUB_OUTPUT"

      - name: Commit bumped VERSION to dev
        run: |
          git add VERSION
          git commit -m "chore: bump version ${{ steps.versions.outputs.old }} → ${{ steps.versions.outputs.new }} [skip ci]"
          git push origin dev

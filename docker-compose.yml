services:
  postgres:
    image: postgres:16-alpine
    container_name: family-svc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-familydb}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-familydb}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: family-svc:latest
    container_name: family-svc-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - HTTP_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-familydb}
      - DB_SSLMODE=disable
    ports:
      - "8080:8080"
    restart: always

volumes:
  pgdata:
